<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>한글 자모음 복습 게임 🎮</title>
  <style>
/* =============================================
   한글 자모음 복습 게임 - 스타일
   ============================================= */
*, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }

:root {
  --red:    #FF6B6B;
  --teal:   #4ECDC4;
  --yellow: #FFE66D;
  --purple: #C77DFF;
  --green:  #52B788;
  --blue:   #45B7D1;
  --orange: #FF8E53;
  --bg:     #FFF9F0;
  --dark:   #2D2D2D;
  --mid:    #666;
  --shadow: 0 6px 24px rgba(0,0,0,.12);
}

body {
  font-family:'Apple SD Gothic Neo','Malgun Gothic','맑은 고딕','NanumGothic','나눔고딕',sans-serif;
  background:var(--bg); color:var(--dark); min-height:100vh; overflow-x:hidden;
}

/* ── 화면 공통 ── */
.screen { display:none; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; padding:20px 16px; animation:fadeUp .35s ease; }
.screen.active { display:flex; }
@keyframes fadeUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }

/* =============================================
   메인 화면
   ============================================= */
#screen-main { background:linear-gradient(155deg,#FFF0E0,#E0F7FA); }

.main-header { text-align:center; margin-bottom:44px; }
.main-title  { font-size:clamp(2rem,9vw,3.8rem); font-weight:900; line-height:1.2; letter-spacing:-1px; }
.cr{color:var(--red)} .ct{color:var(--teal)} 
.main-sub { font-size:clamp(.9rem,3vw,1.15rem); color:var(--mid); margin-top:10px; }

.main-cards { display:flex; gap:24px; flex-wrap:wrap; justify-content:center; }

.mode-card {
  width:clamp(200px,42vw,260px); padding:36px 24px 28px;
  border-radius:28px; border:none; background:#fff;
  box-shadow:var(--shadow); cursor:pointer; text-align:center;
  transition:transform .18s, box-shadow .18s;
}
.mode-card:hover { transform:translateY(-8px); box-shadow:0 16px 40px rgba(0,0,0,.16); }
.mode-card:active { transform:translateY(-2px); }
.card-c { border-top:8px solid var(--red); }
.card-v { border-top:8px solid var(--teal); }

.card-emoji { font-size:3.6rem; display:block; margin-bottom:12px; }
.card-title { font-size:1.8rem; font-weight:900; margin-bottom:8px; }
.card-c .card-title { color:var(--red); }
.card-v .card-title { color:var(--teal); }
.card-desc { font-size:.88rem; color:var(--mid); line-height:1.5; margin-bottom:14px; }

.badge-row { display:flex; gap:5px; justify-content:center; flex-wrap:wrap; }
.badge { padding:3px 10px; border-radius:20px; font-size:.95rem; font-weight:800; }
.card-c .badge { background:#FFE5E5; color:var(--red); }
.card-v .badge { background:#E0F7FA; color:var(--teal); }

/* 장식 */
.deco { position:fixed; font-size:1.4rem; opacity:.3; animation:floatUp 5s ease-in-out infinite; pointer-events:none; }
@keyframes floatUp { 0%,100%{transform:translateY(0) rotate(0deg)} 50%{transform:translateY(-18px) rotate(18deg)} }

/* =============================================
   게임 화면
   ============================================= */
#screen-game { justify-content:flex-start; padding-top:16px; }
#screen-game.bg-c { background:linear-gradient(155deg,#FFF3F0,#F0FFF8); }
#screen-game.bg-v { background:linear-gradient(155deg,#F0FFF4,#E8F4FD); }

/* 게임 헤더 - 2행 flex */
.g-header {
  width:100%; max-width:680px; margin-bottom:4px;
  display:flex; flex-direction:column; gap:6px;
}
.g-header-row1 {
  display:flex; align-items:center; gap:8px;
}
.g-header-row2 {
  display:flex; justify-content:center;
}

.btn-back { background:#fff; border:none; border-radius:50%; width:46px; height:46px; font-size:1.3rem; cursor:pointer; box-shadow:0 2px 8px rgba(0,0,0,.1); transition:transform .15s; flex-shrink:0; }
.btn-back:hover { transform:scale(1.12); }

.g-info { min-width:0; }
.mode-pill { font-size:.75rem; font-weight:800; padding:3px 10px; border-radius:20px; display:inline-block; margin-bottom:2px; }
.pill-c { background:#FFE5E5; color:var(--red); }
.pill-v { background:#E0F7FA; color:var(--teal); }
.g-prog-text { font-size:.82rem; color:var(--mid); }

.score-pill { background:var(--yellow); border-radius:50px; padding:6px 12px; font-size:.85rem; font-weight:900; box-shadow:0 2px 8px rgba(0,0,0,.08); white-space:nowrap; flex-shrink:0; }

/* 타이머 */
.timer-pill {
  background:#fff; border:2px solid #E0E0E0; border-radius:50px;
  padding:6px 12px; font-size:.85rem; font-weight:900;
  box-shadow:0 2px 8px rgba(0,0,0,.06); white-space:nowrap;
  color:var(--dark); transition:border-color .3s, color .3s; flex-shrink:0;
}
.timer-pill.hurry { border-color:var(--red); color:var(--red); animation:pulse .6s ease infinite; }
@keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.07)} }

.prog-wrap { width:100%; max-width:680px; height:10px; background:#E0E0E0; border-radius:10px; margin-bottom:18px; overflow:hidden; }
.prog-bar  { height:100%; border-radius:10px; transition:width .4s ease; }
.prog-c { background:var(--red); }
.prog-v { background:var(--teal); }

/* 낱말 카드 */
.word-card { background:#fff; border-radius:28px; box-shadow:var(--shadow); padding:24px 40px; text-align:center; max-width:500px; width:100%; margin-bottom:16px; }
.w-emoji   { font-size:4rem; display:block; margin-bottom:4px; line-height:1; }
.w-text    { font-size:clamp(2.4rem,8vw,3.8rem); font-weight:900; letter-spacing:6px; line-height:1.1; }
.w-q       { font-size:.95rem; color:var(--mid); margin-top:8px; font-weight:500; line-height:1.5; }
.w-q b     { font-weight:900; }
.q-c b { color:var(--red); }
.q-v b { color:var(--teal); }

.cnt-label { font-size:.88rem; font-weight:700; color:var(--mid); margin-bottom:8px; max-width:500px; width:100%; text-align:left; }

/* 보기 그리드 - 보기가 많아질 수 있으므로 유연하게 */
.choices { display:flex; flex-wrap:wrap; gap:10px; justify-content:center; max-width:560px; width:100%; margin-bottom:16px; }

.ch-btn {
  width:76px; height:76px; border-radius:16px; border:3px solid #E0E0E0;
  background:#fff; font-size:1.95rem; font-weight:900; cursor:pointer;
  transition:transform .13s, box-shadow .13s, border-color .13s, background .13s;
  box-shadow:0 3px 10px rgba(0,0,0,.07); color:var(--dark);
}
.ch-btn:hover:not(:disabled) { transform:translateY(-4px); box-shadow:0 8px 18px rgba(0,0,0,.13); }

.ch-btn.sel-c { border:4px solid var(--red);  background:#FFF0F0; color:var(--red);  transform:translateY(-4px); box-shadow:0 8px 20px rgba(255,107,107,.22); }
.ch-btn.sel-v { border:4px solid var(--teal); background:#E8FAFA; color:var(--teal); transform:translateY(-4px); box-shadow:0 8px 20px rgba(78,205,196,.22); }

.ch-btn.ok   { border:4px solid var(--green)!important; background:#E8F8EE!important; color:var(--green)!important; animation:bnc .4s ease; }
.ch-btn.bad  { border:4px solid #FF4444!important;      background:#FFE8E8!important; color:#FF4444!important;      animation:shk .4s ease; }
.ch-btn.miss { border:4px solid var(--green)!important; background:#E8F8EE!important; color:var(--green)!important; animation:pls .4s ease; }

@keyframes bnc { 0%{transform:scale(1)} 40%{transform:scale(1.18) translateY(-8px)} 70%{transform:scale(.95)} 100%{transform:scale(1)} }
@keyframes shk { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-6px)} 40%{transform:translateX(6px)} 60%{transform:translateX(-4px)} 80%{transform:translateX(4px)} }
@keyframes pls { 0%,100%{transform:scale(1)} 50%{transform:scale(1.12)} }

.feedback { font-size:1.2rem; font-weight:900; min-height:32px; text-align:center; margin-bottom:10px; animation:fadeUp .25s ease; }
.fb-ok  { color:var(--green); }
.fb-bad { color:#FF4444; }

.btn-check, .btn-next {
  padding:14px 42px; border-radius:50px; border:none;
  font-size:1.1rem; font-weight:900; cursor:pointer;
  transition:transform .16s, box-shadow .16s; box-shadow:0 4px 16px rgba(0,0,0,.13);
}
.btn-check { background:linear-gradient(135deg,var(--red),var(--orange)); color:#fff; }
.btn-check:hover:not(:disabled) { transform:translateY(-3px); box-shadow:0 8px 24px rgba(255,107,107,.4); }
.btn-check:disabled { background:#CCC; cursor:not-allowed; box-shadow:none; }
.btn-next  { background:linear-gradient(135deg,var(--teal),var(--blue)); color:#fff; display:none; }
.btn-next:hover { transform:translateY(-3px); box-shadow:0 8px 24px rgba(78,205,196,.4); }

/* =============================================
   결과 화면
   ============================================= */
#screen-result { background:linear-gradient(155deg,#FFF9E0,#E8F8EF); }

.result-card { background:#fff; border-radius:32px; box-shadow:var(--shadow); padding:44px 36px; text-align:center; max-width:460px; width:100%; animation:popIn .5s cubic-bezier(.34,1.56,.64,1); }
@keyframes popIn { from{transform:scale(.7);opacity:0} to{transform:scale(1);opacity:1} }

.r-emoji   { font-size:5rem; display:block; margin-bottom:12px; }
.r-title   { font-size:2rem; font-weight:900; margin-bottom:6px; }
.r-stars   { font-size:2.3rem; margin-bottom:12px; letter-spacing:8px; }
.r-score   { font-size:3.6rem; font-weight:900; color:var(--red); margin:12px 0; line-height:1; }
.r-score span { font-size:1.4rem; color:var(--mid); font-weight:700; }
.r-comment { font-size:1rem; color:var(--mid); margin-bottom:28px; line-height:1.6; }

.r-btns { display:flex; gap:14px; justify-content:center; flex-wrap:wrap; }
.btn-retry, .btn-home { padding:13px 32px; border-radius:50px; border:none; font-size:1rem; font-weight:900; cursor:pointer; transition:transform .16s, box-shadow .16s; box-shadow:0 4px 14px rgba(0,0,0,.1); }
.btn-retry { background:linear-gradient(135deg,var(--red),var(--orange)); color:#fff; }
.btn-retry:hover { transform:translateY(-3px); box-shadow:0 8px 24px rgba(255,107,107,.4); }
.btn-home  { background:#fff; color:var(--dark); border:2px solid #E0E0E0; }
.btn-home:hover { transform:translateY(-3px); background:#F5F5F5; }

/* 컨페티 */
.confetti { position:fixed; border-radius:2px; animation:fall linear forwards; pointer-events:none; z-index:9999; }
@keyframes fall { 0%{transform:translateY(-20px) rotate(0deg);opacity:1} 100%{transform:translateY(110vh) rotate(720deg);opacity:0} }

/* =============================================
   이름 입력 화면
   ============================================= */
#screen-name {
  background:linear-gradient(155deg,#FFF0E0,#E0F7FA);
  justify-content:flex-start; padding-top:24px; padding-bottom:24px;
  overflow-y:auto;
}
.name-card {
  background:#fff; border-radius:32px; box-shadow:var(--shadow);
  padding:28px 32px 24px; text-align:center; max-width:420px; width:100%;
}
.name-title { font-size:1.8rem; font-weight:900; margin-bottom:6px; }
.name-sub   { font-size:.9rem; color:var(--mid); margin-bottom:18px; line-height:1.5; }
.name-input {
  width:100%; padding:13px 18px; border-radius:16px;
  border:3px solid #E0E0E0; font-size:1.4rem; font-weight:800;
  text-align:center; outline:none; transition:border-color .2s;
  font-family:inherit; margin-bottom:14px;
}
.name-input:focus { border-color:var(--teal); }
.name-input::placeholder { color:#CCC; font-weight:400; }

/* 반 선택 */
.class-label { font-size:.88rem; font-weight:700; color:var(--mid); margin-bottom:8px; text-align:left; }
.class-btns { display:flex; gap:7px; justify-content:center; margin-bottom:16px; flex-wrap:wrap; }
.class-btn {
  width:52px; height:52px; border-radius:14px;
  border:3px solid #E0E0E0; background:#fff;
  font-size:1rem; font-weight:900; cursor:pointer;
  transition:transform .13s, border-color .13s, background .13s;
  color:var(--dark);
}
.class-btn:hover { transform:translateY(-3px); border-color:var(--teal); }
.class-btn.selected {
  border-color:var(--teal); background:var(--teal); color:#fff;
  transform:translateY(-3px); box-shadow:0 6px 18px rgba(78,205,196,.35);
}

.btn-name-go {
  width:100%; padding:16px; border-radius:50px; border:none;
  background:linear-gradient(135deg,var(--teal),var(--blue)); color:#fff;
  font-size:1.15rem; font-weight:900; cursor:pointer;
  box-shadow:0 4px 16px rgba(78,205,196,.35); transition:transform .16s, box-shadow .16s;
}
.btn-name-go:hover:not(:disabled) { transform:translateY(-3px); box-shadow:0 8px 24px rgba(78,205,196,.5); }
.btn-name-go:disabled { background:#CCC; cursor:not-allowed; box-shadow:none; }

/* =============================================
   랭킹 화면
   ============================================= */
#screen-rank { background:linear-gradient(155deg,#FFF9E0,#E8F4FD); }
.rank-card {
  background:#fff; border-radius:32px; box-shadow:var(--shadow);
  padding:36px 28px; max-width:480px; width:100%;
}
.rank-title { font-size:1.8rem; font-weight:900; text-align:center; margin-bottom:6px; }
.rank-sub   { font-size:.88rem; color:var(--mid); text-align:center; margin-bottom:12px; }

/* 랭킹 - 반 필터 */
.rank-class-filter { display:flex; gap:6px; justify-content:center; flex-wrap:wrap; margin-bottom:14px; }
.rcf-btn {
  padding:5px 14px; border-radius:50px; border:2px solid #E0E0E0;
  background:#fff; font-size:.82rem; font-weight:800; cursor:pointer; transition:.15s;
  color:var(--mid);
}
.rcf-btn:hover { border-color:var(--purple); color:var(--purple); }
.rcf-btn.active { background:var(--purple); border-color:var(--purple); color:#fff; box-shadow:0 3px 10px rgba(199,125,255,.35); }

.rank-tabs  { display:flex; gap:8px; margin-bottom:16px; justify-content:center; }
.rank-tab {
  padding:7px 20px; border-radius:50px; border:2px solid #E0E0E0;
  background:#fff; font-size:.88rem; font-weight:800; cursor:pointer; transition:.15s;
}
.rank-tab.active-c { background:#FFE5E5; border-color:var(--red); color:var(--red); }
.rank-tab.active-v { background:#E0F7FA; border-color:var(--teal); color:var(--teal); }
.rank-list  { list-style:none; display:flex; flex-direction:column; gap:8px; max-height:340px; overflow-y:auto; }
.rank-item {
  display:flex; align-items:center; gap:12px;
  padding:12px 16px; border-radius:14px; background:#F9F9F9;
  animation:fadeUp .3s ease;
}
.rank-item.me { background:#FFF9E0; border:2px solid var(--yellow); }
.rank-no   { font-size:1.3rem; font-weight:900; width:32px; text-align:center; flex-shrink:0; }
.rank-name { flex:1; font-size:1rem; font-weight:700; }
.rank-class-badge { font-size:.72rem; font-weight:800; background:var(--purple); color:#fff; padding:2px 8px; border-radius:20px; flex-shrink:0; }
.rank-score{ font-size:1.1rem; font-weight:900; color:var(--red); }
.rank-empty { text-align:center; color:var(--mid); padding:32px; font-size:.95rem; }
.rank-loading { text-align:center; color:var(--mid); padding:24px; }
.r-btns-row { display:flex; gap:12px; justify-content:center; flex-wrap:wrap; margin-top:20px; }
.btn-rank {
  padding:12px 28px; border-radius:50px; border:none;
  background:linear-gradient(135deg,var(--yellow),var(--orange)); color:var(--dark);
  font-size:.95rem; font-weight:900; cursor:pointer;
  box-shadow:0 4px 14px rgba(0,0,0,.1); transition:transform .16s;
}
.btn-rank:hover { transform:translateY(-3px); }

/* 메인 화면 - 랭킹 미리보기 버튼 */
.btn-preview-rank {
  margin-bottom:22px;
  padding:10px 28px; border-radius:50px; border:2px solid var(--yellow);
  background:#fff; color:var(--dark);
  font-size:.95rem; font-weight:900; cursor:pointer;
  box-shadow:0 3px 12px rgba(0,0,0,.08); transition:transform .16s, box-shadow .16s;
}
.btn-preview-rank:hover { transform:translateY(-3px); box-shadow:0 6px 20px rgba(255,230,109,.5); background:var(--yellow); }

/* 반응형 */
@media(max-width:480px){
  .word-card{padding:20px 18px}
  .ch-btn{width:64px;height:64px;font-size:1.7rem}
  .main-cards{flex-direction:column;align-items:center}
  .mode-card{width:88vw}
  .result-card{padding:28px 16px}
  .rank-card{padding:24px 16px}
  .choices{gap:8px}
}
  </style>
</head>
<body>

<!-- ========== 이름 입력 화면 ========== -->
<div id="screen-name" class="screen active">
  <div class="name-card">
    <div style="font-size:2.8rem;margin-bottom:8px">✏️</div>
    <div class="name-title">이름을 입력해요!</div>
    <p class="name-sub">내 점수가 랭킹에 올라가요! 🏆<br>친구들과 실력을 겨뤄봐요!</p>
    <input class="name-input" id="name-input" type="text" placeholder="예) 김민준" maxlength="6"
      oninput="checkNameReady()"
      onkeydown="if(event.key==='Enter')goToMain()" />
    <div class="class-label">📚 우리 반을 선택해요!</div>
    <div class="class-btns">
      <button class="class-btn" data-class="1" onclick="selectClass(this)">1반</button>
      <button class="class-btn" data-class="2" onclick="selectClass(this)">2반</button>
      <button class="class-btn" data-class="3" onclick="selectClass(this)">3반</button>
      <button class="class-btn" data-class="4" onclick="selectClass(this)">4반</button>
      <button class="class-btn" data-class="5" onclick="selectClass(this)">5반</button>
    </div>
    <button class="btn-name-go" id="btn-name-go" onclick="goToMain()" disabled>시작하기 🚀</button>
    <button class="btn-preview-rank" style="margin-top:12px;width:100%" onclick="previewRankFromName()">🏆 랭킹 먼저 보기</button>
  </div>
</div>

<!-- ========== 메인 화면 ========== -->
<div id="screen-main" class="screen">
  <div class="main-header">
    <h1 class="main-title"><span class="cr">자</span>·<span class="ct">모</span>음<br>복습 게임</h1>
    <p class="main-sub">낱말 속 자음·모음을 찾아봐요! 🔍</p>
  </div>
  <!-- 랭킹 미리보기 버튼 -->
  <button class="btn-preview-rank" onclick="previewRank()">🏆 랭킹 보기</button>

  <div class="main-cards">
    <button class="mode-card card-c" onclick="startGame('consonant')">
      <span class="card-emoji">🔵</span>
      <div class="card-title">자음 복습</div>
      <p class="card-desc">낱말 속에 숨어있는<br>자음을 찾아봐요</p>
      <div class="badge-row">
        <span class="badge">ㄱ</span><span class="badge">ㄲ</span><span class="badge">ㄴ</span>
        <span class="badge">ㄷ</span><span class="badge">ㄸ</span><span class="badge">ㄹ</span>
        <span class="badge">ㅁ</span><span class="badge">ㅂ</span><span class="badge">ㅃ</span>
      </div>
    </button>
    <button class="mode-card card-v" onclick="startGame('vowel')">
      <span class="card-emoji">🟢</span>
      <div class="card-title">모음 복습</div>
      <p class="card-desc">낱말 속에 숨어있는<br>모음을 찾아봐요</p>
      <div class="badge-row">
        <span class="badge">ㅏ</span><span class="badge">ㅐ</span><span class="badge">ㅑ</span>
        <span class="badge">ㅓ</span><span class="badge">ㅔ</span><span class="badge">ㅗ</span>
        <span class="badge">ㅘ</span><span class="badge">ㅚ</span><span class="badge">ㅣ</span>
      </div>
    </button>
  </div>
</div>

<!-- ========== 게임 화면 ========== -->
<div id="screen-game" class="screen bg-c">
  <div class="g-header">
    <div class="g-header-row1">
      <button class="btn-back" onclick="goHome()">🏠</button>
      <div class="g-info">
        <span class="mode-pill pill-c" id="mode-pill">🔵 자음 복습</span>
        <div class="g-prog-text" id="prog-text">1 / 10</div>
      </div>
      <div class="score-pill" id="score-disp">⭐ 0점</div>
    </div>
    <div class="g-header-row2">
      <div class="timer-pill" id="timer-disp">⏱️ 0:00</div>
    </div>
  </div>
  <div class="prog-wrap"><div class="prog-bar prog-c" id="prog-bar" style="width:0%"></div></div>

  <div class="word-card">
    <span class="w-emoji" id="w-emoji">🌳</span>
    <div class="w-text"   id="w-text">나무</div>
    <p class="w-q q-c"   id="w-q"></p>
  </div>

  <div class="cnt-label" id="cnt-label"></div>
  <div class="choices"   id="choices"></div>
  <div class="feedback"  id="feedback"></div>

const fbApp = initializeApp(firebaseConfig);
const db    = getDatabase(fbApp);

// 점수 저장 (반 + 시간 포함)
window.saveScore = function(name, classNum, mode, score, timeSec) {
  return push(ref(db, 'scores'), {
    name, classNum, mode, score,
    timeSec,
    ts: Date.now()
  });
};

// 랭킹 불러오기 (모드 + 반 필터)
// 정렬: 점수 높은 순 → 점수 같으면 시간 짧은 순
window.loadRanking = function(mode, classFilter, callback) {
  const q = query(
    ref(db, 'scores'),
    orderByChild('score'),
    limitToLast(200)
  );
  onValue(q, snap => {
    // 1) 전체 수집
    const all = [];
    snap.forEach(child => {
      const d = child.val();
      if(d.mode !== mode) return;
      if(classFilter !== 'all' && String(d.classNum) !== String(classFilter)) return;
      all.push(d);
    });

    // 2) 같은 이름+반 → 최고기록 1개만 남기기
    //    점수 높은 것 우선, 같은 점수면 시간 짧은 것 우선
    const best = {};
    all.forEach(d => {
      const key = `${d.classNum}_${d.name}`;
      const prev = best[key];
      if(!prev) { best[key] = d; return; }
      const better =
        d.score > prev.score ||
        (d.score === prev.score && (d.timeSec ?? 9999) < (prev.timeSec ?? 9999));
      if(better) best[key] = d;
    });

    // 3) 정렬 후 상위 20개
    const rows = Object.values(best).sort((a, b) => {
      if(b.score !== a.score) return b.score - a.score;
      return (a.timeSec ?? 9999) - (b.timeSec ?? 9999);
    });
    callback(rows.slice(0, 20));
  });
};
</script>

const ALL_CONSONANTS = [

];
const ALL_VOWELS = [
  'ㅏ','ㅐ','ㅑ','ㅒ','ㅓ','ㅔ','ㅕ','ㅖ',
  'ㅗ','ㅘ','ㅙ','ㅚ','ㅛ',
  'ㅜ','ㅝ','ㅞ','ㅟ','ㅠ',
  'ㅡ','ㅢ','ㅣ'
];

/* ── 한글 분해 ──────────────────────────────── */
const CHO  = ['ㄱ','ㄲ','ㄴ','ㄷ','ㄸ','ㄹ','ㅁ','ㅂ','ㅃ','ㅅ','ㅆ','ㅇ','ㅈ','ㅉ','ㅊ','ㅋ','ㅌ','ㅍ','ㅎ'];

function decompose(ch) {
  const c = ch.charCodeAt(0) - 0xAC00;
  if (c < 0 || c > 11171) return null;
  return { cho:Math.floor(c/28/21), jung:Math.floor(c/28)%21, jong:c%28 };
}
function hasBatchim(word) {
  for (const c of word) { const d=decompose(c); if(!d||d.jong!==0) return true; }
  return false;
}
function analyze(word) {
  const cs=new Set(), vs=new Set();
  for (const c of word) {
    const d=decompose(c); if(!d||d.jong!==0) continue;
    const cho=CHO[d.cho], jung=JUNG[d.jung];

    vs.add(jung);

/* ── 필터링 + 분석 ─────────────────────────── */
const seen = new Set();
const WORDS = RAW.filter(({w}) => {
  if(seen.has(w)) return false;
  if(w.length<2)  return false;
  if(hasBatchim(w)) return false;
  seen.add(w); return true;
}).map(({w,e}) => ({word:w, emoji:e, ...analyze(w)}))
  .filter(w => w.consonants.length+w.vowels.length>0);

console.log('✅ 사용 가능 단어:', WORDS.length+'개');

/* ── 모드별 단어 + 보기 ────────────────────── */
function getWords(mode, n=10) {
  const f = WORDS.filter(w => mode==='consonant' ? w.consonants.length>=1 : w.vowels.length>=1);
  return [...f].sort(()=>Math.random()-.5).slice(0,Math.min(n,f.length));
}

function makeChoices(correct, pool, total=6) {
  const wrong = pool.filter(o=>!correct.includes(o)).sort(()=>Math.random()-.5);
  const need  = Math.max(0, total-correct.length);
  return [...correct, ...wrong.slice(0,need)].sort(()=>Math.random()-.5);
}

function startTimer() {
  timerSec = 0;

    timerSec++;
    const m = Math.floor(timerSec / 60);
    const s = String(timerSec % 60).padStart(2, '0');
    const el = document.getElementById('timer-disp');
    el.textContent = `⏱️ ${m}:${s}`;
    el.classList.toggle('hurry', timerSec >= 120);

}
function stopTimer() {
  clearInterval(timerRef);
  timerRef = null;
}
function fmtTime(sec) {
  if(sec == null) return '-';
  const m = Math.floor(sec / 60);
  const s = String(sec % 60).padStart(2, '0');
  return `${m}분 ${s}초`;
}

  const totalC = Math.min(Math.max(5, correct.length+3), pool.length);

  document.getElementById('score-disp').textContent= `⭐ ${G.score}점`;
  document.getElementById('prog-bar').style.width  = (G.idx/G.total*100)+'%';

  // 낱말
  document.getElementById('w-emoji').textContent = q.emoji;
  document.getElementById('w-text').textContent  = q.word;
  const wq=document.getElementById('w-q');
  wq.className=`w-q ${isC?'q-c':'q-v'}`;
  wq.innerHTML=`"${q.word}" 에 쓰인 <b>${isC?'자음':'모음'}</b>을 모두 고르세요!`;

  document.getElementById('cnt-label').textContent=`✏️ 정답은 ${correct.length}개예요!`;

  // 보기 버튼
  const grid=document.getElementById('choices'); grid.innerHTML='';
  G.choices.forEach(ch=>{
    const btn=document.createElement('button');
    btn.className='ch-btn'; btn.textContent=ch; btn.dataset.val=ch;
    btn.onclick=()=>toggle(btn,ch); grid.appendChild(btn);
  });

  // 초기화
  document.getElementById('feedback').textContent='';
  document.getElementById('feedback').className='feedback';
  const bc=document.getElementById('btn-check'), bn=document.getElementById('btn-next');
  bc.style.display='inline-block'; bc.disabled=true; bn.style.display='none';
}

/* ── 선택 토글 ─────────────────────────────── */
function toggle(btn, val) {
  if(G.answered) return;
  const sc=G.mode==='consonant'?'sel-c':'sel-v';
  if(G.selected.has(val)){ G.selected.delete(val); btn.classList.remove(sc); }
  else { G.selected.add(val); btn.classList.add(sc); }
  document.getElementById('btn-check').disabled=G.selected.size===0;
}

/* ── 정답 확인 ─────────────────────────────── */
function checkAnswer() {
  if(G.answered) return; G.answered=true;
  const q=G.questions[G.idx], isC=G.mode==='consonant';
  const correct=new Set(isC?q.consonants:q.vowels), sel=G.selected;
  const ok=sel.size===correct.size&&[...sel].every(v=>correct.has(v));

  document.querySelectorAll('.ch-btn').forEach(btn=>{
    const v=btn.dataset.val; btn.disabled=true;
    btn.classList.remove('sel-c','sel-v');
    if(correct.has(v)&&sel.has(v))       btn.classList.add('ok');
    else if(!correct.has(v)&&sel.has(v)) btn.classList.add('bad');
    else if(correct.has(v)&&!sel.has(v)) btn.classList.add('miss');
  });

  const fb=document.getElementById('feedback');
  if(ok){ G.score+=10; fb.textContent='🎉 정답이에요! 훌륭해요!'; fb.className='feedback fb-ok'; confetti(22); }
  else  { fb.textContent=`💡 정답은 [ ${[...correct].join('  ')} ] 이에요!`; fb.className='feedback fb-bad'; }

  document.getElementById('score-disp').textContent=`⭐ ${G.score}점`;
  document.getElementById('btn-check').style.display='none';
  const bn=document.getElementById('btn-next');
  bn.style.display='inline-block';
  bn.textContent=G.idx>=G.total-1?'결과 보기 🏆':'다음 문제 ▶';
}

/* ── 다음 문제 ─────────────────────────────── */
function nextQ() { G.idx++; G.idx>=G.total ? showResult() : renderQ(); }

/* ── 결과 화면 ─────────────────────────────── */
function showResult() {
  stopTimer();
  const pct=Math.round(G.score/(G.total*10)*100);
  const cases=[
    [100,'🏆','완벽해요!',  '모두 다 맞혔어요! 정말 대단해요! 🎉','⭐⭐⭐'],
    [80, '🌟','훌륭해요!',  '거의 다 맞혔네요! 조금만 더 연습해요! 🎈','⭐⭐⭐'],
    [60, '😊','잘했어요!',  '잘하고 있어요! 한번 더 해볼까요? 😄','⭐⭐'],
    [40, '🙂','조금 더!',   '괜찮아요! 다시 하면 더 잘할 수 있어요! 🌈','⭐'],
    [0,  '💪','같이 공부해요!','천천히 다시 해봐요! 할 수 있어요! 🌟','⭐'],
  ];
  const [,em,ti,co,st]=cases.find(([p])=>pct>=p);
  document.getElementById('r-emoji').textContent=em;
  document.getElementById('r-title').textContent=ti;
  document.getElementById('r-stars').textContent=st;
  document.getElementById('r-score').innerHTML=`${G.score}<span> / ${G.total*10}점</span>`;
  document.getElementById('r-time').textContent=`⏱️ ${fmtTime(timerSec)}`;
  document.getElementById('r-comment').textContent=co;
  document.getElementById('r-player-name').textContent=`${playerClass}반 ${playerName}의 점수`;
  show('screen-result');
  if(pct>=60) confetti(60);
  // Firebase에 점수 + 시간 저장
  if(playerName && typeof window.saveScore==='function') {
    window.saveScore(playerName, playerClass, G.mode, G.score, timerSec)
      .catch(e=>console.warn('점수 저장 실패:', e));
  }
}

/* ── 재도전·홈 ─────────────────────────────── */
function retryGame(){ startGame(G.mode); }
function goHome(){
  if(document.getElementById('screen-game').classList.contains('active')){
    if(!confirm('처음 화면으로 돌아갈까요?')) return;
  }
  stopTimer();
  show('screen-main');
}

/* ── 랭킹 화면 ─────────────────────────────── */
// 게임 후 결과에서 진입
function showRank() {
  rankFromMain = false;
  rankTab      = G.mode;
  rankFilter   = 'all';
  _openRank();
}

// 메인에서 게임 전 미리보기로 진입
function previewRank() {
  rankFromMain = true;
  rankTab      = 'consonant';
  rankFilter   = 'all';
  _openRank();
}

// 이름 입력 화면에서 바로 랭킹 보기 (이름 없이도 가능)
function previewRankFromName() {
  rankFromMain = 'name'; // 'name' = 이름 입력 화면으로 돌아감
  rankTab      = 'consonant';
  rankFilter   = 'all';
  _openRank();
}

function _openRank() {
  show('screen-rank');
  // 재도전 버튼: 게임 후에만 표시
  document.getElementById('rank-retry-btn').style.display = rankFromMain ? 'none' : 'inline-block';
  // 반 필터 버튼 초기화
  document.querySelectorAll('.rcf-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.filter === 'all');
  });
  updateRankTabs();
  updateRankSub();
  fetchRank();
}

// 랭킹에서 돌아가기 (진입 경로에 따라 분기)
function rankGoBack() {
  if(rankFromMain === 'name') show('screen-name');
  else if(rankFromMain)       show('screen-main');
  else                        show('screen-result');
}

function switchTab(mode) {
  rankTab = mode;
  updateRankTabs();
  fetchRank();
}

function filterClass(btn) {
  document.querySelectorAll('.rcf-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  rankFilter = btn.dataset.filter;
  updateRankSub();
  fetchRank();
}

function updateRankTabs() {
  document.getElementById('tab-c').className = 'rank-tab' + (rankTab==='consonant'?' active-c':'');
  document.getElementById('tab-v').className = 'rank-tab' + (rankTab==='vowel'?' active-v':'');
}

function updateRankSub() {
  const sub = document.getElementById('rank-sub');
  sub.textContent = rankFilter === 'all'
    ? '전체 최고 기록이에요! 🌟'
    : `${rankFilter}반 최고 기록이에요! 🌟`;
}

function fetchRank() {
  const list = document.getElementById('rank-list');
  list.innerHTML = '<li class="rank-loading">불러오는 중... ⏳</li>';
  if(typeof window.loadRanking !== 'function') {
    list.innerHTML = '<li class="rank-empty">❌ Firebase 연결 중...</li>'; return;
  }
  window.loadRanking(rankTab, rankFilter, rows => {
    if(rows.length === 0) {
      list.innerHTML = '<li class="rank-empty">아직 기록이 없어요!<br>첫 번째 도전자가 되어봐요 🌟</li>';
      return;
    }
    const medals = ['🥇','🥈','🥉'];
    list.innerHTML = rows.map((r,i) => {
      const isMe = r.name === playerName && String(r.classNum) === String(playerClass);
      const no   = medals[i] || `${i+1}`;
      const t    = r.timeSec != null ? fmtTime(r.timeSec) : '-';
      return `<li class="rank-item${isMe?' me':''}">
        <span class="rank-no">${no}</span>
        <span class="rank-class-badge">${r.classNum || '?'}반</span>
        <span class="rank-name">${r.name}${isMe?' 👈 나!':''}</span>
        <span class="rank-score">${r.score}점 <small style="font-size:.75rem;color:var(--mid);font-weight:600">${t}</small></span>
      </li>`;
    }).join('');
  });
}

/* ── 컨페티 🎉 ─────────────────────────────── */
function confetti(n=24){
  const cols=['#FF6B6B','#FFE66D','#4ECDC4','#C77DFF','#52B788','#FF8E53','#45B7D1'];
  for(let i=0;i<n;i++){
    const el=document.createElement('div'); el.className='confetti';
    const s=8+Math.random()*10;
    el.style.cssText=`left:${Math.random()*100}vw;top:-20px;width:${s}px;height:${s}px;background:${cols[Math.floor(Math.random()*cols.length)]};border-radius:${Math.random()>.5?'50%':'2px'};animation-duration:${1.4+Math.random()*2}s;animation-delay:${Math.random()*.8}s;`;
    document.body.appendChild(el); el.addEventListener('animationend',()=>el.remove());
  }
}

/* ── 장식 별 ───────────────────────────────── */
function makeDecos(){
  [['⭐','7%','4%','0s','5s'],['🌟','11%','','1.5s','6s'],['✨','74%','3%','0.8s','4.5s'],
   ['💫','79%','','2.2s','7s'],['🎈','43%','','1.1s','5.5s']].forEach(([t,top,left,delay,dur],i)=>{
    const el=document.createElement('div'); el.className='deco'; el.textContent=t;
    el.style.cssText=`top:${top};${left?'left:'+left:i===1?'right:6%':i===3?'right:4%':'left:93%'};animation-delay:${delay};animation-duration:${dur};`;
    document.body.appendChild(el);
  });
}
makeDecos();
</script>
