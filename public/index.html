<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>한글 자모음 복습 게임 🎮</title>
  <style>
/* =============================================
   한글 자모음 복습 게임 - 스타일
   ============================================= */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --red:    #FF6B6B;
  --teal:   #4ECDC4;
  --yellow: #FFE66D;
  --purple: #C77DFF;
  --green:  #52B788;
  --blue:   #45B7D1;
  --bg:     #FFF9F0;
  --white:  #FFFFFF;
  --dark:   #2D2D2D;
  --mid:    #666666;
  --shadow: 0 6px 24px rgba(0,0,0,0.12);
  --r:      20px;
}

body {
  font-family: 'Apple SD Gothic Neo','Malgun Gothic','맑은 고딕','NanumGothic','나눔고딕',sans-serif;
  background: var(--bg);
  color: var(--dark);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── 화면 공통 ── */
.screen {
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: 20px 16px;
  animation: fadeUp .35s ease;
}
.screen.active { display: flex; }

@keyframes fadeUp {
  from { opacity:0; transform:translateY(18px); }
  to   { opacity:1; transform:translateY(0); }
}

/* =============================================
   메인 화면
   ============================================= */
#screen-main {
  background: linear-gradient(155deg,#FFF0E0 0%,#E0F7FA 100%);
}

.main-header { text-align:center; margin-bottom:44px; }

.main-title {
  font-size: clamp(2rem,9vw,3.8rem);
  font-weight: 900;
  line-height: 1.2;
  letter-spacing: -1px;
}
.cr { color: var(--red); }
.ct { color: var(--teal); }
.cp { color: var(--purple); }

.main-sub {
  font-size: clamp(.95rem,3vw,1.2rem);
  color: var(--mid);
  margin-top: 10px;
}

.main-cards {
  display: flex;
  gap: 24px;
  flex-wrap: wrap;
  justify-content: center;
}

.mode-card {
  width: clamp(200px,42vw,260px);
  padding: 36px 24px 28px;
  border-radius: 28px;
  border: none;
  background: white;
  box-shadow: var(--shadow);
  cursor: pointer;
  text-align: center;
  transition: transform .18s, box-shadow .18s;
  position: relative;
  overflow: hidden;
}
.mode-card:hover { transform:translateY(-8px); box-shadow:0 16px 40px rgba(0,0,0,.16); }
.mode-card:active { transform:translateY(-2px); }

.card-c { border-top: 8px solid var(--red); }
.card-v { border-top: 8px solid var(--teal); }

.card-emoji { font-size:3.8rem; display:block; margin-bottom:12px; }
.card-title { font-size:1.8rem; font-weight:900; margin-bottom:8px; }
.card-c .card-title { color:var(--red); }
.card-v .card-title { color:var(--teal); }
.card-desc { font-size:.9rem; color:var(--mid); line-height:1.5; margin-bottom:14px; }

.badge-row { display:flex; gap:6px; justify-content:center; flex-wrap:wrap; }
.badge {
  padding: 4px 12px;
  border-radius: 20px;
  font-size: 1rem;
  font-weight: 800;
}
.card-c .badge { background:#FFE5E5; color:var(--red); }
.card-v .badge { background:#E0F7FA; color:var(--teal); }

/* 장식 별 */
.deco {
  position:fixed; font-size:1.4rem; opacity:.35;
  animation:floatUp 5s ease-in-out infinite;
  pointer-events:none;
}
@keyframes floatUp {
  0%,100% { transform:translateY(0) rotate(0deg); }
  50%      { transform:translateY(-18px) rotate(18deg); }
}

/* =============================================
   게임 화면
   ============================================= */
#screen-game {
  justify-content: flex-start;
  padding-top: 16px;
}
#screen-game.bg-c { background:linear-gradient(155deg,#FFF0F0 0%,#F0FFF8 100%); }
#screen-game.bg-v { background:linear-gradient(155deg,#F0FFF4 0%,#E8F4FD 100%); }

/* 게임 헤더 */
.g-header {
  width:100%; max-width:640px;
  display:flex; align-items:center; gap:10px;
  margin-bottom:14px;
}

.btn-back {
  background:white; border:none; border-radius:50%;
  width:46px; height:46px; font-size:1.3rem;
  cursor:pointer; box-shadow:0 2px 8px rgba(0,0,0,.1);
  transition:transform .15s; flex-shrink:0;
}
.btn-back:hover { transform:scale(1.12); }

.g-info { flex:1; }
.mode-pill {
  font-size:.8rem; font-weight:800;
  padding:3px 12px; border-radius:20px;
  display:inline-block; margin-bottom:3px;
}
.pill-c { background:#FFE5E5; color:var(--red); }
.pill-v { background:#E0F7FA; color:var(--teal); }

.g-prog-text { font-size:.88rem; color:var(--mid); }

.score-pill {
  background:var(--yellow);
  border-radius:50px; padding:8px 16px;
  font-size:.95rem; font-weight:900;
  box-shadow:0 2px 8px rgba(0,0,0,.08);
  white-space:nowrap;
}

/* 프로그레스 바 */
.prog-bar-wrap {
  width:100%; max-width:640px;
  height:10px; background:#E0E0E0;
  border-radius:10px; margin-bottom:22px; overflow:hidden;
}
.prog-bar {
  height:100%; border-radius:10px;
  transition:width .4s ease;
}
.prog-c { background:var(--red); }
.prog-v { background:var(--teal); }

/* 낱말 카드 */
.word-card {
  background:white; border-radius:28px;
  box-shadow:var(--shadow);
  padding:28px 44px; text-align:center;
  max-width:480px; width:100%;
  margin-bottom:20px;
}
.w-emoji { font-size:4.2rem; display:block; margin-bottom:6px; line-height:1; }
.w-text  { font-size:clamp(2.6rem,9vw,4.2rem); font-weight:900; letter-spacing:6px; line-height:1.1; }
.w-q {
  font-size:1rem; color:var(--mid);
  margin-top:10px; font-weight:500; line-height:1.5;
}
.w-q b { font-weight:900; }
.q-c b { color:var(--red); }
.q-v b { color:var(--teal); }

/* 정답 개수 힌트 */
.cnt-label {
  font-size:.92rem; font-weight:700; color:var(--mid);
  margin-bottom:10px; max-width:480px; width:100%;
  text-align:left;
}

/* 보기 그리드 */
.choices {
  display:flex; flex-wrap:wrap; gap:12px;
  justify-content:center;
  max-width:480px; width:100%;
  margin-bottom:20px;
}

.ch-btn {
  width:84px; height:84px;
  border-radius:18px; border:3px solid #E0E0E0;
  background:white; font-size:2.2rem; font-weight:900;
  cursor:pointer;
  transition:transform .14s, box-shadow .14s, border-color .14s, background .14s;
  box-shadow:0 3px 10px rgba(0,0,0,.07);
  color:var(--dark);
}
.ch-btn:hover:not(:disabled) {
  transform:translateY(-4px);
  box-shadow:0 8px 20px rgba(0,0,0,.13);
}
/* 선택됨 */
.ch-btn.sel-c { border:4px solid var(--red); background:#FFF0F0; color:var(--red); transform:translateY(-4px); box-shadow:0 8px 20px rgba(255,107,107,.2); }
.ch-btn.sel-v { border:4px solid var(--teal); background:#E8FAFA; color:var(--teal); transform:translateY(-4px); box-shadow:0 8px 20px rgba(78,205,196,.2); }
/* 정답/오답 */
.ch-btn.ok   { border:4px solid var(--green)!important; background:#E8F8EE!important; color:var(--green)!important; animation:bounce .4s ease; }
.ch-btn.bad  { border:4px solid #FF4444!important; background:#FFE8E8!important; color:#FF4444!important; animation:shake .4s ease; }
.ch-btn.miss { border:4px solid var(--green)!important; background:#E8F8EE!important; color:var(--green)!important; animation:pulse .4s ease; }

@keyframes bounce {
  0%   { transform:scale(1); }
  40%  { transform:scale(1.18) translateY(-8px); }
  70%  { transform:scale(.95) translateY(-2px); }
  100% { transform:scale(1); }
}
@keyframes shake {
  0%,100% { transform:translateX(0); }
  20%     { transform:translateX(-6px); }
  40%     { transform:translateX(6px); }
  60%     { transform:translateX(-4px); }
  80%     { transform:translateX(4px); }
}
@keyframes pulse {
  0%,100% { transform:scale(1); }
  50%     { transform:scale(1.12); }
}

/* 피드백 */
.feedback {
  font-size:1.25rem; font-weight:900;
  min-height:34px; text-align:center;
  margin-bottom:12px; animation:fadeUp .25s ease;
}
.fb-ok  { color:var(--green); }
.fb-bad { color:#FF4444; }

/* 액션 버튼 */
.btn-check, .btn-next {
  padding:15px 44px; border-radius:50px;
  border:none; font-size:1.15rem; font-weight:900;
  cursor:pointer; transition:transform .16s, box-shadow .16s;
  box-shadow:0 4px 16px rgba(0,0,0,.14);
}
.btn-check {
  background:linear-gradient(135deg,var(--red),#FF8E53); color:white;
}
.btn-check:hover:not(:disabled) { transform:translateY(-3px); box-shadow:0 8px 24px rgba(255,107,107,.4); }
.btn-check:disabled { background:#CCC; cursor:not-allowed; box-shadow:none; }
.btn-next {
  background:linear-gradient(135deg,var(--teal),var(--blue)); color:white;
  display:none;
}
.btn-next:hover { transform:translateY(-3px); box-shadow:0 8px 24px rgba(78,205,196,.4); }

/* =============================================
   결과 화면
   ============================================= */
#screen-result {
  background:linear-gradient(155deg,#FFF9E0 0%,#E8F8EF 100%);
}

.result-card {
  background:white; border-radius:32px;
  box-shadow:var(--shadow);
  padding:44px 36px; text-align:center;
  max-width:460px; width:100%;
  animation:popIn .5s cubic-bezier(.34,1.56,.64,1);
}
@keyframes popIn {
  from { transform:scale(.7); opacity:0; }
  to   { transform:scale(1);  opacity:1; }
}

.r-emoji { font-size:5rem; display:block; margin-bottom:14px; }
.r-title { font-size:2rem; font-weight:900; margin-bottom:8px; }
.r-stars { font-size:2.4rem; margin-bottom:14px; letter-spacing:8px; }
.r-score {
  font-size:3.8rem; font-weight:900;
  color:var(--red); margin:14px 0; line-height:1;
}
.r-score span { font-size:1.5rem; color:var(--mid); font-weight:700; }
.r-comment { font-size:1.05rem; color:var(--mid); margin-bottom:30px; line-height:1.6; }

.r-btns { display:flex; gap:14px; justify-content:center; flex-wrap:wrap; }

.btn-retry, .btn-home {
  padding:13px 34px; border-radius:50px;
  border:none; font-size:1.05rem; font-weight:900;
  cursor:pointer; transition:transform .16s, box-shadow .16s;
  box-shadow:0 4px 16px rgba(0,0,0,.1);
}
.btn-retry { background:linear-gradient(135deg,var(--red),#FF8E53); color:white; }
.btn-retry:hover { transform:translateY(-3px); box-shadow:0 8px 24px rgba(255,107,107,.4); }
.btn-home { background:white; color:var(--dark); border:2px solid #E0E0E0; }
.btn-home:hover { transform:translateY(-3px); background:#F5F5F5; }

/* 컨페티 */
.confetti {
  position:fixed; border-radius:2px;
  animation:fall linear forwards;
  pointer-events:none; z-index:9999;
}
@keyframes fall {
  0%   { transform:translateY(-20px) rotate(0deg);   opacity:1; }
  100% { transform:translateY(110vh) rotate(720deg); opacity:0; }
}

/* 반응형 */
@media (max-width:480px) {
  .word-card { padding:22px 20px; }
  .ch-btn    { width:70px; height:70px; font-size:1.9rem; }
  .main-cards { flex-direction:column; align-items:center; }
  .mode-card  { width:88vw; }
  .result-card { padding:30px 18px; }
}
  </style>
</head>
<body>

<!-- ===================== 메인 화면 ===================== -->
<div id="screen-main" class="screen active">
  <div class="main-header">
    <h1 class="main-title">
      <span class="cr">자</span>·<span class="ct">모</span>음<br>복습 게임
    </h1>
    <p class="main-sub">낱말 속 자음·모음을 찾아봐요! 🔍</p>
  </div>

  <div class="main-cards">
    <button class="mode-card card-c" id="btn-c" onclick="startGame('consonant')">
      <span class="card-emoji">🔵</span>
      <div class="card-title">자음 복습</div>
      <p class="card-desc">낱말 속에 숨어있는<br>자음을 찾아봐요</p>
      <div class="badge-row">
        <span class="badge">ㄱ</span>
        <span class="badge">ㄴ</span>
        <span class="badge">ㅁ</span>
        <span class="badge">ㅂ</span>
        <span class="badge">ㅅ</span>
      </div>
    </button>

    <button class="mode-card card-v" id="btn-v" onclick="startGame('vowel')">
      <span class="card-emoji">🟢</span>
      <div class="card-title">모음 복습</div>
      <p class="card-desc">낱말 속에 숨어있는<br>모음을 찾아봐요</p>
      <div class="badge-row">
        <span class="badge">ㅏ</span>
        <span class="badge">ㅓ</span>
        <span class="badge">ㅗ</span>
        <span class="badge">ㅜ</span>
        <span class="badge">ㅣ</span>
      </div>
    </button>
  </div>
</div>

<!-- ===================== 게임 화면 ===================== -->
<div id="screen-game" class="screen bg-c">
  <div class="g-header">
    <button class="btn-back" onclick="goHome()">🏠</button>
    <div class="g-info">
      <span class="mode-pill pill-c" id="mode-pill">🔵 자음 복습</span>
      <div class="g-prog-text" id="prog-text">1 / 10</div>
    </div>
    <div class="score-pill" id="score-disp">⭐ 0점</div>
  </div>

  <div class="prog-bar-wrap">
    <div class="prog-bar prog-c" id="prog-bar" style="width:0%"></div>
  </div>

  <div class="word-card">
    <span class="w-emoji" id="w-emoji">🌳</span>
    <div class="w-text"  id="w-text">나무</div>
    <p class="w-q q-c"   id="w-q"></p>
  </div>

  <div class="cnt-label" id="cnt-label"></div>
  <div class="choices"   id="choices"></div>

  <div class="feedback"  id="feedback"></div>

  <div style="display:flex;gap:14px;align-items:center;">
    <button class="btn-check" id="btn-check" onclick="checkAnswer()" disabled>확인하기 ✅</button>
    <button class="btn-next"  id="btn-next"  onclick="nextQ()">다음 문제 ▶</button>
  </div>
</div>

<!-- ===================== 결과 화면 ===================== -->
<div id="screen-result" class="screen">
  <div class="result-card">
    <span class="r-emoji"   id="r-emoji">🏆</span>
    <div  class="r-title"   id="r-title">완벽해요!</div>
    <div  class="r-stars"   id="r-stars">⭐⭐⭐</div>
    <div  class="r-score"   id="r-score">100<span> / 100점</span></div>
    <p    class="r-comment" id="r-comment">모두 맞혔어요!</p>
    <div class="r-btns">
      <button class="btn-retry" onclick="retryGame()">다시 도전! 🔄</button>
      <button class="btn-home"  onclick="goHome()">처음으로 🏠</button>
    </div>
  </div>
</div>

<script>
// =============================================
//   데이터 & 로직
// =============================================

// 기본 자음 (ㅇ 이응 제외 - 초성에서 무음)
const CONSONANTS = ['ㄱ','ㄴ','ㄷ','ㄹ','ㅁ','ㅂ','ㅅ','ㅈ','ㅊ','ㅋ','ㅌ','ㅍ','ㅎ'];
// 기본 모음 (복합모음 제외)
const VOWELS     = ['ㅏ','ㅑ','ㅓ','ㅕ','ㅗ','ㅛ','ㅜ','ㅠ','ㅡ','ㅣ'];

// 초성 19개
const CHO  = ['ㄱ','ㄲ','ㄴ','ㄷ','ㄸ','ㄹ','ㅁ','ㅂ','ㅃ','ㅅ','ㅆ','ㅇ','ㅈ','ㅉ','ㅊ','ㅋ','ㅌ','ㅍ','ㅎ'];
// 중성 21개
const JUNG = ['ㅏ','ㅐ','ㅑ','ㅒ','ㅓ','ㅔ','ㅕ','ㅖ','ㅗ','ㅘ','ㅙ','ㅚ','ㅛ','ㅜ','ㅝ','ㅞ','ㅟ','ㅠ','ㅡ','ㅢ','ㅣ'];

// 복합 모음 (1학년 수준에서 제외)
const COMPLEX = new Set(['ㅐ','ㅒ','ㅔ','ㅖ','ㅘ','ㅙ','ㅚ','ㅝ','ㅞ','ㅟ','ㅢ']);

function decompose(char) {
  const c = char.charCodeAt(0) - 0xAC00;
  if (c < 0 || c > 11171) return null;
  return {
    cho:  Math.floor(c / 28 / 21),
    jung: Math.floor(c / 28) % 21,
    jong: c % 28,
  };
}

function hasBatchim(word) {
  for (const c of word) { const d = decompose(c); if (!d || d.jong !== 0) return true; }
  return false;
}
function hasComplex(word) {
  for (const c of word) { const d = decompose(c); if (!d || COMPLEX.has(JUNG[d.jung])) return true; }
  return false;
}
function analyze(word) {
  const cs = new Set(), vs = new Set();
  for (const c of word) {
    const d = decompose(c);
    if (!d || d.jong !== 0) continue;
    const cho  = CHO[d.cho];
    const jung = JUNG[d.jung];
    if (cho !== 'ㅇ') cs.add(cho);
    vs.add(jung);
  }
  return { consonants:[...cs], vowels:[...vs] };
}

// 원시 단어 목록
const RAW = [
  {w:'나무',   e:'🌳'},  {w:'나비',   e:'🦋'},  {w:'고구마', e:'🍠'},
  {w:'포도',   e:'🍇'},  {w:'토마토', e:'🍅'},  {w:'오리',   e:'🦆'},
  {w:'여우',   e:'🦊'},  {w:'하마',   e:'🦛'},  {w:'고래',   e:'🐋'},
  {w:'사자',   e:'🦁'},  {w:'거미',   e:'🕷️'},  {w:'모기',   e:'🦟'},
  {w:'개미',   e:'🐜'},  {w:'기러기', e:'🪿'},  {w:'타조',   e:'🦤'},
  {w:'치타',   e:'🐆'},  {w:'제비',   e:'🐦'},  {w:'키위',   e:'🥝'},
  {w:'자두',   e:'🍑'},  {w:'바나나', e:'🍌'},  {w:'파파야', e:'🍈'},
  {w:'오이',   e:'🥒'},  {w:'파도',   e:'🌊'},  {w:'바다',   e:'🌊'},
  {w:'모래',   e:'🏖️'},  {w:'보리',   e:'🌾'},  {w:'나리',   e:'🌸'},
  {w:'고사리', e:'🌿'},  {w:'모자',   e:'🎩'},  {w:'기차',   e:'🚂'},
  {w:'구두',   e:'👞'},  {w:'치마',   e:'👗'},  {w:'바지',   e:'👖'},
  {w:'의자',   e:'🪑'},  {w:'피아노', e:'🎹'},  {w:'소파',   e:'🛋️'},
  {w:'도끼',   e:'🪓'},  {w:'가위',   e:'✂️'},  {w:'부채',   e:'🪭'},
  {w:'호두',   e:'🌰'},  {w:'비누',   e:'🧼'},  {w:'바위',   e:'🪨'},
  {w:'그네',   e:'🎢'},  {w:'지구',   e:'🌍'},  {w:'피자',   e:'🍕'},
  {w:'두부',   e:'🫙'},  {w:'우유',   e:'🥛'},  {w:'코코아', e:'☕'},
  {w:'소시지', e:'🌭'},  {w:'아버지', e:'👨'},  {w:'어머니', e:'👩'},
  {w:'아이',   e:'👦'},  {w:'다리',   e:'🦵'},  {w:'머리',   e:'👤'},
  {w:'이마',   e:'😐'},  {w:'허리',   e:'🫀'},  {w:'도레미', e:'🎵'},
  {w:'무지개', e:'🌈'},  {w:'소나기', e:'🌦️'},  {w:'이야기', e:'📖'},
  {w:'미소',   e:'😊'},  {w:'바보',   e:'😜'},  {w:'두더지', e:'🐭'},
  {w:'지우개', e:'✏️'},  {w:'보자기', e:'🎁'},  {w:'도우미', e:'🙋'},
  {w:'허수아비',e:'🌾'}, {w:'나루',   e:'⛵'},  {w:'가수',   e:'🎤'},
  {w:'호미',   e:'⛏️'},  {w:'새우',   e:'🦐'},  {w:'수저',   e:'🥄'},
  {w:'버터',   e:'🧈'},  {w:'치즈',   e:'🧀'},  {w:'주스',   e:'🍹'},
  {w:'포비',   e:'🐻'},  {w:'나사',   e:'🔩'},  {w:'시소',   e:'🎠'},
  {w:'바위',   e:'🪨'},  {w:'도마뱀', e:'🦎'},  {w:'파리',   e:'🪰'},
  {w:'조개',   e:'🐚'},  {w:'두부',   e:'🫙'},  {w:'세수',   e:'🧼'},
  {w:'도미노', e:'🎲'},  {w:'오토바이',e:'🏍️'}, {w:'피리',   e:'🪈'},
  {w:'고리',   e:'🔗'},  {w:'가마',   e:'🏺'},  {w:'나무꾼', e:'🪓'},
  {w:'사이다', e:'🥤'},  {w:'비료',   e:'🌱'},  {w:'오빠',   e:'👦'},
  {w:'누나',   e:'👧'},  {w:'바구니', e:'🧺'},  {w:'가로수', e:'🌳'},
  {w:'이슬비', e:'🌦️'},  {w:'소고기', e:'🥩'},
];

// 유효한 단어만 필터링 + 분석
const seen = new Set();
const WORDS = RAW.filter(({w}) => {
  if (seen.has(w)) return false;
  if (w.length < 2) return false;
  if (hasBatchim(w)) return false;
  if (hasComplex(w)) return false;
  seen.add(w);
  return true;
}).map(({w,e}) => ({ word:w, emoji:e, ...analyze(w) }))
  .filter(w => w.consonants.length >= 1 || w.vowels.length >= 1);

console.log('✅ 로드된 단어:', WORDS.length, '개');

// 모드별 단어 필터
function getWordsByMode(mode, n=10) {
  const filtered = WORDS.filter(w =>
    mode==='consonant' ? w.consonants.length>=1 : w.vowels.length>=1
  );
  return [...filtered].sort(()=>Math.random()-.5).slice(0, Math.min(n, filtered.length));
}

// 보기 생성 (총 5~6개, 정답 모두 포함)
function makeChoices(correct, allOpts, total=5) {
  const wrong = allOpts.filter(o => !correct.includes(o))
                       .sort(()=>Math.random()-.5);
  const need  = Math.max(0, total - correct.length);
  return [...correct, ...wrong.slice(0, need)].sort(()=>Math.random()-.5);
}

// =============================================
//   게임 상태
// =============================================
let G = {
  mode:      'consonant',
  questions: [],
  idx:       0,
  score:     0,
  selected:  new Set(),
  answered:  false,
  choices:   [],
  total:     10,
};

// =============================================
//   화면 전환
// =============================================
function show(id) {
  ['screen-main','screen-game','screen-result'].forEach(s => {
    document.getElementById(s).classList.remove('active');
  });
  document.getElementById(id).classList.add('active');
}

// =============================================
//   게임 시작
// =============================================
function startGame(mode) {
  G.mode      = mode;
  G.questions = getWordsByMode(mode, G.total);
  G.idx       = 0;
  G.score     = 0;

  const gs = document.getElementById('screen-game');
  gs.className = `screen active ${mode==='consonant'?'bg-c':'bg-v'}`;

  document.getElementById('prog-bar').className = `prog-bar ${mode==='consonant'?'prog-c':'prog-v'}`;

  show('screen-game');
  renderQ();
}

// =============================================
//   문제 렌더링
// =============================================
function renderQ() {
  const q  = G.questions[G.idx];
  const isC = G.mode === 'consonant';
  const allOpts = isC ? CONSONANTS : VOWELS;
  const correct = isC ? q.consonants : q.vowels;

  // 보기 개수: 최소 5개, 정답이 많으면 정답+2
  const total = Math.min(Math.max(5, correct.length+2), allOpts.length);
  G.choices  = makeChoices(correct, allOpts, total);
  G.selected = new Set();
  G.answered = false;

  // 헤더
  document.getElementById('mode-pill').textContent   = isC ? '🔵 자음 복습' : '🟢 모음 복습';
  document.getElementById('mode-pill').className     = `mode-pill ${isC?'pill-c':'pill-v'}`;
  document.getElementById('prog-text').textContent   = `${G.idx+1} / ${G.total}`;
  document.getElementById('score-disp').textContent  = `⭐ ${G.score}점`;
  document.getElementById('prog-bar').style.width    = (G.idx / G.total * 100) + '%';

  // 낱말
  document.getElementById('w-emoji').textContent = q.emoji;
  document.getElementById('w-text').textContent  = q.word;

  const wq = document.getElementById('w-q');
  wq.className = `w-q ${isC?'q-c':'q-v'}`;
  wq.innerHTML = `"${q.word}" 에 쓰인 <b>${isC?'자음':'모음'}</b>을 모두 고르세요!`;

  document.getElementById('cnt-label').textContent = `✏️ 정답은 ${correct.length}개예요!`;

  // 보기 버튼
  const grid = document.getElementById('choices');
  grid.innerHTML = '';
  G.choices.forEach(ch => {
    const btn = document.createElement('button');
    btn.className    = 'ch-btn';
    btn.textContent  = ch;
    btn.dataset.val  = ch;
    btn.onclick      = () => toggleChoice(btn, ch);
    grid.appendChild(btn);
  });

  // 피드백 초기화
  const fb = document.getElementById('feedback');
  fb.textContent = '';
  fb.className   = 'feedback';

  // 버튼 초기화
  const bc = document.getElementById('btn-check');
  const bn = document.getElementById('btn-next');
  bc.style.display = 'inline-block';
  bc.disabled      = true;
  bn.style.display = 'none';
}

// =============================================
//   보기 선택/해제
// =============================================
function toggleChoice(btn, val) {
  if (G.answered) return;
  const sel   = G.selected;
  const selCls = G.mode==='consonant' ? 'sel-c' : 'sel-v';
  if (sel.has(val)) {
    sel.delete(val);
    btn.classList.remove(selCls);
  } else {
    sel.add(val);
    btn.classList.add(selCls);
  }
  document.getElementById('btn-check').disabled = sel.size === 0;
}

// =============================================
//   정답 확인
// =============================================
function checkAnswer() {
  if (G.answered) return;
  G.answered = true;

  const q   = G.questions[G.idx];
  const isC = G.mode === 'consonant';
  const correct  = new Set(isC ? q.consonants : q.vowels);
  const selected = G.selected;
  const isRight  = selected.size===correct.size && [...selected].every(v=>correct.has(v));

  // 보기 버튼 색상
  document.querySelectorAll('.ch-btn').forEach(btn => {
    const v = btn.dataset.val;
    btn.disabled = true;
    btn.classList.remove('sel-c','sel-v');
    if      (correct.has(v) && selected.has(v))  btn.classList.add('ok');
    else if (!correct.has(v) && selected.has(v)) btn.classList.add('bad');
    else if (correct.has(v) && !selected.has(v)) btn.classList.add('miss');
  });

  // 피드백
  const fb = document.getElementById('feedback');
  if (isRight) {
    G.score += 10;
    fb.textContent = '🎉 정답이에요! 훌륭해요!';
    fb.className   = 'feedback fb-ok';
    confetti(20);
  } else {
    fb.textContent = `💡 정답은 [ ${[...correct].join(', ')} ] 이에요!`;
    fb.className   = 'feedback fb-bad';
  }

  document.getElementById('score-disp').textContent = `⭐ ${G.score}점`;
  document.getElementById('btn-check').style.display = 'none';
  const bn = document.getElementById('btn-next');
  bn.style.display = 'inline-block';
  bn.textContent   = G.idx >= G.total-1 ? '결과 보기 🏆' : '다음 문제 ▶';
}

// =============================================
//   다음 문제
// =============================================
function nextQ() {
  G.idx++;
  if (G.idx >= G.total) showResult();
  else renderQ();
}

// =============================================
//   결과 화면
// =============================================
function showResult() {
  const pct = Math.round(G.score / (G.total*10) * 100);
  let emoji='😊', title='잘했어요!', comment='다음엔 더 잘할 수 있어요! 💪', stars='⭐⭐';

  if (pct===100) {
    emoji='🏆'; title='완벽해요!';
    comment='모두 맞혔어요! 정말 대단해요! 🎉'; stars='⭐⭐⭐';
  } else if (pct>=80) {
    emoji='🌟'; title='훌륭해요!';
    comment='거의 다 맞혔어요! 조금만 더 연습해요! 🎈'; stars='⭐⭐⭐';
  } else if (pct>=60) {
    emoji='😊'; title='잘했어요!';
    comment='잘하고 있어요! 다시 한번 도전해봐요! 😄'; stars='⭐⭐';
  } else if (pct>=40) {
    emoji='🙂'; title='조금 더 연습해요!';
    comment='괜찮아요! 다시 하면 더 잘할 수 있어요! 🌈'; stars='⭐';
  } else {
    emoji='💪'; title='같이 더 공부해요!';
    comment='천천히 다시 해봐요! 할 수 있어요! 🌟'; stars='⭐';
  }

  document.getElementById('r-emoji').textContent   = emoji;
  document.getElementById('r-title').textContent   = title;
  document.getElementById('r-stars').textContent   = stars;
  document.getElementById('r-score').innerHTML     = `${G.score}<span> / ${G.total*10}점</span>`;
  document.getElementById('r-comment').textContent = comment;

  show('screen-result');
  if (pct>=60) confetti(60);
}

// =============================================
//   다시 도전 / 처음으로
// =============================================
function retryGame() { startGame(G.mode); }
function goHome() {
  if (document.getElementById('screen-game').classList.contains('active')) {
    if (!confirm('처음 화면으로 돌아갈까요?')) return;
  }
  show('screen-main');
}

// =============================================
//   컨페티 🎉
// =============================================
function confetti(n=24) {
  const colors = ['#FF6B6B','#FFE66D','#4ECDC4','#C77DFF','#52B788','#FF8E53','#45B7D1'];
  for (let i=0; i<n; i++) {
    const el = document.createElement('div');
    el.className = 'confetti';
    const size = 8 + Math.random()*10;
    el.style.cssText = `
      left:${Math.random()*100}vw; top:-20px;
      width:${size}px; height:${size}px;
      background:${colors[Math.floor(Math.random()*colors.length)]};
      border-radius:${Math.random()>.5?'50%':'2px'};
      animation-duration:${1.4+Math.random()*2}s;
      animation-delay:${Math.random()*.8}s;
    `;
    document.body.appendChild(el);
    el.addEventListener('animationend', ()=>el.remove());
  }
}

// =============================================
//   장식 별
// =============================================
function createDecoStars() {
  const items = ['⭐','🌟','✨','💫','🎈'];
  const pos   = [
    {top:'7%',left:'4%',delay:'0s',dur:'5s'},
    {top:'12%',right:'6%',delay:'1.5s',dur:'6s'},
    {top:'72%',left:'3%',delay:'0.8s',dur:'4.5s'},
    {top:'78%',right:'4%',delay:'2.2s',dur:'7s'},
    {top:'42%',left:'93%',delay:'1.1s',dur:'5.5s'},
  ];
  pos.forEach((p,i)=>{
    const el = document.createElement('div');
    el.className   = 'deco';
    el.textContent = items[i%items.length];
    Object.assign(el.style, p);
    el.style.animationDuration = p.dur;
    document.body.appendChild(el);
  });
}

createDecoStars();
</script>
